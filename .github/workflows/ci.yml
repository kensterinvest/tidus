name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a new push arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dev mode: skips OIDC requirement so tests don't need a real IdP
  ENVIRONMENT: development
  # Isolated test DB so CI never touches production data
  DATABASE_URL: sqlite+aiosqlite:///./tidus_ci.db
  # Silence FutureWarning from google-generativeai (deprecated SDK, not breaking)
  PYTHONWARNINGS: "ignore::FutureWarning"
  PYTHONUNBUFFERED: "1"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff
        run: uv run ruff check . --output-format=github

  # ── Unit + Integration + Concurrency tests ──────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short -q

      - name: Run integration tests (with mocked vendor responses)
        run: uv run pytest tests/integration/ -v --tb=short

      - name: Run concurrency stress tests
        run: uv run pytest tests/concurrency/ -v --tb=short -q

      - name: Upload coverage (Python 3.12 only)
        if: matrix.python-version == '3.12'
        run: uv run pytest --cov=tidus --cov-report=xml --cov-report=term-missing -q
        continue-on-error: true   # Don't fail the build if coverage upload fails

  # ── Full suite gate (required to merge) ────────────────────────────────────
  all-tests:
    name: All tests pass
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All checks passed."
