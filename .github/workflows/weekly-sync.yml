name: Pricing Sync (manual / emergency)

# Cadence note: scheduled cron was REMOVED 2026-05-21 when the canonical
# scheduler moved to a systemd timer on the z-tidus VPS (tidus-sync.timer
# runs the same pipeline Sun + Wed 02:00 UTC). This workflow stays in
# place purely as a manual / emergency fallback — fire it from the
# Actions tab if the VPS is down or you need an out-of-band magazine run.
#
# History (kept for context):
#   - Originally replaced session-scoped Claude Code cron (commit 00b9b9d).
#   - Cadence widened weekly Sunday → Sun + Wed (2026-04-23).
#   - schedule: removed (2026-05-21), VPS systemd timer became canonical.

on:
  workflow_dispatch:       # manual emergency fallback only

permissions:
  contents: write        # needed for pushing DB/reports/index.html back to main

concurrency:
  group: weekly-sync
  cancel-in-progress: false

jobs:
  weekly_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo (with tidus.db committed state)
        uses: actions/checkout@v4
        with:
          # Default GITHUB_TOKEN is enough — we only push to this repo.
          # (Cross-repo push to kensterinvest.github.io was removed 2026-04-23
          # when Pages was enabled on the tidus repo directly. That repo is
          # actually the jewelry e-commerce site, not Tidus.)
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Configure git identity for auto-commits
        run: |
          git config --global user.name  "tidus-bot[bot]"
          git config --global user.email "tidus-bot@users.noreply.github.com"

      - name: Run pricing sync (price + snapshot + discovery + report + email + landing)
        env:
          TIDUS_CANARY_SAMPLE_SIZE: "0"
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          TIDUS_SMTP_FROM: ${{ secrets.TIDUS_SMTP_FROM }}
          # Vendor API keys are optional. Each one missing => that vendor's
          # `/v1/models` endpoint won't be polled (build_discovery_sources
          # skips the source). Add them as GitHub secrets to enable
          # auto-discovery for that vendor.
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: enables BOTH (a) per-vendor discovery against
          # the Anthropic /v1/models endpoint AND (b) the AI sanity-check gate
          # in tidus/sync/ai_verifier.py that asks Claude to verify anomalous
          # (>=50%) price moves before they enter the registry. Without this
          # secret, the gate fails-open (accepts all moves) and the magazine
          # still ships.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          XAI_API_KEY:       ${{ secrets.XAI_API_KEY }}
        run: uv run python scripts/weekly_full_sync.py

      - name: Commit updated DB + reports + auto-catalog + subscribers to main
        run: |
          # discovered_models.json (under reports/) is the discovery state
          # sidecar — first-seen timestamps survive across cron runs.
          # config/models.auto.yaml is the auto-promoted catalog written by
          # tidus/sync/auto_promote.py; it must be committed so ModelRegistry
          # picks it up on the NEXT run (and so a `git status` doesn't show
          # spurious diffs locally).
          # config/subscribers.yaml is the live subscriber list — the VPS
          # web service writes to it whenever someone subscribes via the
          # landing page, and the sync wrapper carries those entries
          # through `git reset --hard` by staging them back. Committing it
          # here keeps both runners' subscriber views in sync.
          git add tidus.db reports/ config/models.auto.yaml config/subscribers.yaml || true
          if ! git diff --cached --quiet; then
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(pricing-sync): DB + reports + auto catalog + subscribers ${DATE}"
            git push origin HEAD:main
          else
            echo "No DB, report, auto-catalog, or subscriber changes to commit."
          fi
