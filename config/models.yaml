# Tidus Model Registry
# ─────────────────────────────────────────────────────────────────────────────
# This file is the single source of truth for all AI model pricing, tiers,
# and capabilities. It is read at startup and refreshed weekly by the
# price_sync job. Price changes are written back here and logged to the DB.
#
# Fields:
#   model_id          — unique identifier (used in API requests)
#   vendor            — matches the adapter class vendor constant
#   tier              — 1 (premium/expensive) → 4 (local/free)
#   max_context       — maximum context window in tokens
#   input_price       — USD per 1K input tokens  (0.0 for local models)
#   output_price      — USD per 1K output tokens (0.0 for local models)
#   tokenizer         — tiktoken_cl100k | tiktoken_o200k | anthropic |
#                       sentencepiece | google | ollama
#   latency_p50_ms    — baseline median latency; updated by health probes
#   capabilities      — list from: chat, code, reasoning, extraction,
#                       classification, summarization, creative, multimodal,
#                       long_context, agents
#   min_complexity    — simple | moderate | complex | critical
#   max_complexity    — simple | moderate | complex | critical
#   is_local          — true = self-hosted, no API key, zero cost
#   enabled           — false = excluded from routing (auto-set on failure)
#   deprecated        — true = vendor EOL; route via fallbacks only
#   fallbacks         — ordered list: cheaper → mid → premium → local
#   last_price_check  — ISO 8601 date; updated by weekly sync job
#   last_health_check — ISO 8601 datetime; updated by health probe
#
# ADAPTER STATUS:
#   ✅ openai       — tidus/adapters/openai_adapter.py
#   ✅ anthropic    — tidus/adapters/anthropic_adapter.py
#   ✅ google       — tidus/adapters/google_adapter.py
#   ✅ mistral      — tidus/adapters/mistral_adapter.py
#   ✅ deepseek     — tidus/adapters/deepseek_adapter.py
#   ✅ xai          — tidus/adapters/xai_adapter.py
#   ✅ moonshot     — tidus/adapters/moonshot_adapter.py
#   ✅ ollama       — tidus/adapters/ollama_adapter.py
#   🔧 cohere       — adapter not yet built (community contribution welcome)
#   🔧 qwen         — adapter not yet built; OpenAI-compatible API
#   🔧 perplexity   — adapter not yet built; search-augmented generation
#   🔧 together     — adapter not yet built; OpenAI-compatible API
#   🔧 groq         — adapter not yet built; OpenAI-compatible API
#
# PRICING AUDIT: 2026-04-03
#   Sources: openai.com/api/pricing · platform.claude.com · ai.google.dev
#            mistral.ai/pricing · api-docs.deepseek.com · docs.x.ai
#            platform.moonshot.ai · cohere.com/pricing
#            alibabacloud.com/help/en/model-studio/model-pricing
#            docs.perplexity.ai · together.ai/pricing · groq.com/pricing
# ─────────────────────────────────────────────────────────────────────────────

