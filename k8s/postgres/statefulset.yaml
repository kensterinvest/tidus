apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tidus-postgres
  namespace: tidus
  labels:
    app.kubernetes.io/name: tidus-postgres
    app.kubernetes.io/component: database
spec:
  serviceName: tidus-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tidus-postgres
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tidus-postgres
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: tidus
            - name: POSTGRES_DB
              value: tidus
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tidus-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tidus", "-d", "tidus"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "tidus", "-d", "tidus"]
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tidus-postgres
  namespace: tidus
  labels:
    app.kubernetes.io/name: tidus-postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tidus-postgres
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
