apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tidus.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tidus.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | quote }}
  MISTRAL_API_KEY: {{ .Values.secrets.mistralApiKey | quote }}
  DEEPSEEK_API_KEY: {{ .Values.secrets.deepseekApiKey | quote }}
  XAI_API_KEY: {{ .Values.secrets.xaiApiKey | quote }}
  MOONSHOT_API_KEY: {{ .Values.secrets.moonshotApiKey | quote }}
  OIDC_ISSUER_URL: {{ .Values.secrets.oidcIssuerUrl | quote }}
  OIDC_CLIENT_ID: {{ .Values.secrets.oidcClientId | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
